  <link rel="icon" href="assets/whitelogo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <header class="top-bar" id="top-bar">

      <a class="logo" id="site-logo" data-nav="/" href="#/" aria-label="HireMeNow home">

        <span class="icon" aria-hidden="true"></span>
        <input type="search" name="q" placeholder="Search jobs" aria-label="Search jobs" autocomplete="off">
      </form>
      <div class="top-bar-actions" id="top-bar-actions"></div>
    </div>
  </header>

    <aside class="sidebar-left" id="sidebar-left" aria-label="Main navigation"></aside>
